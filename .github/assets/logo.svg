      <stop offset="0" stop-color="#EAB94B"/>
      <stop offset="0.33" stop-color="#E97D5F"/>
      <stop offset="0.66" stop-color="#8E7BE0"/>
      <stop offset="1" stop-color="#4FC79A"/>
